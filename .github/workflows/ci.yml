name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

jobs:
    quality:
        name: Code Quality & Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: TypeScript type check
              run: npx tsc --noEmit

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - name: Run tests
              run: npm run test:run

            - name: Build
              run: npm run build
